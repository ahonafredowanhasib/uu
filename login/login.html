<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uttara University Login Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brandBlue: '#2629e5',
                        brandBtn: '#174ce3',
                        brandBtnHover: '#1440c2',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white flex justify-center items-center min-h-screen font-sans antialiased text-gray-900 p-4">

    <div
        class="w-full max-w-[520px] border border-gray-200 rounded-[28px] p-8 md:p-12 shadow-[0_4px_20px_rgba(0,0,0,0.02)]">

        <div class="flex items-start gap-4 mb-8">
            <div class="flex items-center text-brandBlue font-bold text-sm leading-tight mt-1.5">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-7 h-8 mr-1">
                    <path d="M12 2L3 6v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V6l-9-4z" stroke="currentColor"
                        fill="none" />
                    <path d="M12 2v20" stroke="currentColor" stroke-dasharray="2 2" />
                    <path d="M3 12h18" stroke="currentColor" stroke-dasharray="2 2" />
                </svg>
                <span>Uttara<br>University</span>
            </div>
            <div>
                <h1 class="text-[30px] font-bold text-black mb-2 leading-tight">Welcome back</h1>
                <p class="text-sm text-gray-500">Please enter your credentials to access your portal</p>
            </div>
        </div>

        <div class="flex bg-[#ededed] p-1.5 rounded-xl mb-8" id="tab-container">
            <button type="button" onclick="switchTab(this)"
                class="tab-btn flex-1 text-center py-3 text-sm font-medium rounded-lg transition-all duration-300 bg-white text-blue-600 shadow-sm">
                Student
            </button>
            <button type="button" onclick="switchTab(this)"
                class="tab-btn flex-1 text-center py-3 text-sm font-medium rounded-lg transition-all duration-300 text-gray-500 hover:text-gray-700 bg-transparent">
                Faculty
            </button>
            <button type="button" onclick="switchTab(this)"
                class="tab-btn flex-1 text-center py-3 text-sm font-medium rounded-lg transition-all duration-300 text-gray-500 hover:text-gray-700 bg-transparent">
                Admin
            </button>
        </div>

        <form action="#">
            <div class="mb-5">
                <div class="flex justify-between items-center mb-2">
                    <label for="userid" class="text-sm text-gray-600 font-medium">User ID</label>
                </div>
                <div class="relative flex items-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="absolute left-3.5 text-gray-400 w-5 h-5">
                        <rect x="3" y="6" width="18" height="12" rx="2" ry="2"></rect>
                        <path d="M7 14v-1a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1"></path>
                        <circle cx="10" cy="9" r="1"></circle>
                        <line x1="16" y1="10" x2="18" y2="10"></line>
                        <line x1="16" y1="12" x2="18" y2="12"></line>
                    </svg>
                    <input type="text" id="userid" placeholder="ST-2024-001" required
                        class="w-full py-3.5 pr-3.5 pl-11 text-[15px] border border-gray-300 rounded-xl outline-none text-gray-900 transition-colors duration-200 placeholder-gray-400 focus:border-brandBlue focus:ring-1 focus:ring-brandBlue">
                </div>
            </div>

            <div class="mb-5">
                <div class="flex justify-between items-center mb-2">
                    <label for="password" class="text-sm text-gray-600 font-medium">Password</label>
                    <a href="#" class="text-sm text-blue-600 font-medium no-underline hover:underline">Forgot
                        password?</a>
                </div>
                <div class="relative flex items-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="absolute left-3.5 text-gray-400 w-5 h-5">
                        <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="••••••••••••" required
                        class="w-full py-3.5 pr-3.5 pl-11 text-[15px] border border-gray-300 rounded-xl outline-none text-gray-900 transition-colors duration-200 placeholder-gray-400 focus:border-brandBlue focus:ring-1 focus:ring-brandBlue">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-brandBtn hover:bg-brandBtnHover text-white text-[15px] font-semibold py-4 rounded-xl cursor-pointer mt-2.5 transition-colors duration-300">
                Sign In
            </button>
        </form>
    </div>

    <script>
        function switchTab(clickedElement) {
            // Get all tab buttons
            const tabs = document.querySelectorAll('.tab-btn');

            // Define active and inactive class lists
            const activeClasses = ['bg-white', 'text-blue-600', 'shadow-sm'];
            const inactiveClasses = ['text-gray-500', 'hover:text-gray-700', 'bg-transparent'];

            // Remove active classes from all tabs and add inactive classes
            tabs.forEach(tab => {
                tab.classList.remove(...activeClasses);
                tab.classList.add(...inactiveClasses);
            });

            // Add active classes to the clicked tab and remove inactive classes
            clickedElement.classList.remove(...inactiveClasses);
            clickedElement.classList.add(...activeClasses);
        }
    </script>
</body>

</html>
